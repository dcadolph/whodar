{{define "doc"}}<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{.Title}} · whodar docs</title>
	<meta name="description" content="{{.Desc}}">
	<meta property="og:title" content="{{.Title}} · whodar">
	<meta property="og:description" content="{{.Desc}}">
	<meta property="og:type" content="article">
	<link rel="canonical" href="https://whodar.dev/docs/{{.Slug}}">
	{{template "assets" .}}
</head>
<body class="docs">
	{{template "header" .}}
	<main class="wrap doc-main">
		<aside class="doc-side">
			<div class="doc-side-h"><a href="/docs/">Documentation</a></div>
			<nav>{{range .Nav}}<a href="{{.Href}}"{{if .Active}} class="on" aria-current="page"{{end}}>{{.Title}}</a>{{end}}</nav>
		</aside>
		<article class="doc">
{{.Body}}
			<div class="doc-foot">
				{{with .Prev}}<a class="dpn prev" href="{{.Href}}"><span>← Previous</span><b>{{.Title}}</b></a>{{else}}<span></span>{{end}}
				{{with .Next}}<a class="dpn next" href="{{.Href}}"><span>Next →</span><b>{{.Title}}</b></a>{{end}}
			</div>
		</article>
	</main>
	{{template "footer" .}}
</body>
</html>{{end}}
