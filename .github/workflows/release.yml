name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out=whodar
          [ "$GOOS" = windows ] && out=whodar.exe
          go build -trimpath \
            -ldflags "-s -w -X github.com/dcadolph/whodar/cmd.version=${GITHUB_REF_NAME}" \
            -o "$out" .

      - name: Archive
        run: |
          name="whodar_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = windows ]; then
            zip "${name}.zip" whodar.exe
            echo "ASSET=${name}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${name}.tar.gz" whodar
            echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
