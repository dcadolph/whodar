<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>whodar</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/whodar-logo.png">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a class="side-brand" href="#/">
        <img class="side-logo" src="/static/whodar-logo.png" alt="whodar - know who knows">
      </a>
      <p class="side-tag">know who knows</p>
      <nav id="side-nav">
        <a href="#/" data-view="ask">Ask</a>
        <a href="#/people" data-view="people">People
          <span class="nav-count" data-count="people"></span></a>
        <a href="#/channels" data-view="channels">Channels
          <span class="nav-count" data-count="channels"></span></a>
        <a href="#/teams" data-view="teams">Teams
          <span class="nav-count" data-count="teams"></span></a>
        <a href="#/topics" data-view="topics">Topics
          <span class="nav-count" data-count="topics"></span></a>
      </nav>
      <div class="side-foot">
        <a class="side-link" target="_blank" rel="noopener"
           href="https://github.com/dcadolph/whodar/blob/main/docs/GETTING_STARTED.md">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.744 3.744 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574ZM8.755 4.75l-.004 7.322a3.752 3.752 0 0 1 1.992-.572H14.5v-9h-3.495a2.25 2.25 0 0 0-2.25 2.25Z"/></svg>
          Docs
        </a>
        <a class="side-link" target="_blank" rel="noopener" aria-label="whodar on GitHub"
           href="https://github.com/dcadolph/whodar">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
          GitHub
        </a>
        <span class="side-version">whodar {{.Version}}</span>
      </div>
    </aside>

    <main>
      <section id="view-ask">
        <form id="ask-form" autocomplete="off">
          <input id="q" name="q" type="text"
                 placeholder="who do I talk to about billing retries" autofocus>
          <div class="controls">
            <div id="mode-seg" class="seg" role="group" aria-label="Answer mode">
              <button type="button" class="seg-btn active" data-mode="keyword" aria-pressed="true"
                      data-tip="Matches your exact words, with typo tolerance. Always available.">
                <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M9 1 3 9h4l-1 6 7-9H8z"/></svg>
                Keyword
              </button>
              <button type="button" class="seg-btn" data-mode="semantic" aria-pressed="false"
                      data-tip='Matches by meaning: "failed payments" can find "billing retries".'>
                <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="6" cy="8" r="4.25" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="8" r="4.25" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                Meaning
              </button>
              <button type="button" class="seg-btn" data-mode="llm" aria-pressed="false"
                      data-tip="A model picks the best matches and writes a recommendation. Pick a provider below.">
                <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1l1.8 4.2L14 7l-4.2 1.8L8 13l-1.8-4.2L2 7l4.2-1.8z"/><path d="M12.6 10.6l.8 1.9 1.9.8-1.9.8-.8 1.9-.8-1.9-1.9-.8 1.9-.8z"/></svg>
                AI
              </button>
            </div>
            <button type="submit" class="ask-btn">Ask</button>
          </div>

          <div id="provider-seg" class="seg seg-sub" role="group" aria-label="AI provider" hidden>
            <button type="button" class="seg-btn active" data-provider="ollama" aria-pressed="true"
                    data-tip="A private model on this machine, via Ollama.">Ollama</button>
            <button type="button" class="seg-btn" data-provider="anthropic" aria-pressed="false"
                    data-tip="Anthropic's Claude.">Claude</button>
            <button type="button" class="seg-btn" data-provider="openai" aria-pressed="false"
                    data-tip="OpenAI's ChatGPT.">ChatGPT</button>
            <button type="button" class="seg-btn" data-provider="gemini" aria-pressed="false"
                    data-tip="Google's Gemini.">Gemini</button>
          </div>
        </form>

        <div id="examples" class="examples">
          <span class="examples-label">Try</span>
        </div>

        <p id="status" class="status" role="status"></p>
        <div id="summary" class="summary" hidden></div>

        <section id="people-section" hidden>
          <h2>People</h2>
          <div id="people" class="cards"></div>
        </section>

        <section id="channels-section" hidden>
          <h2>Channels</h2>
          <div id="channels" class="cards"></div>
        </section>
      </section>

      <section id="view-directory" hidden>
        <div class="dir-head">
          <h2 id="dir-title"></h2>
          <p id="dir-status" class="dir-count" role="status"></p>
        </div>
        <div class="dir-controls">
          <input id="dir-filter" type="text" placeholder="Filter...">
          <select id="facet-team" class="facet" hidden aria-label="Filter by team"></select>
          <select id="facet-org" class="facet" hidden aria-label="Filter by org"></select>
        </div>
        <div id="dir-list" class="cards"></div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
