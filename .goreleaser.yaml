version: 2
project_name: whodar

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: whodar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/dcadolph/whodar/cmd.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

dockers:
  - image_templates:
      - "ghcr.io/dcadolph/whodar:{{ .Version }}-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/dcadolph/whodar"
      - "--label=org.opencontainers.image.licenses=AGPL-3.0-or-later"
  - image_templates:
      - "ghcr.io/dcadolph/whodar:{{ .Version }}-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/dcadolph/whodar"
      - "--label=org.opencontainers.image.licenses=AGPL-3.0-or-later"

docker_manifests:
  - name_template: "ghcr.io/dcadolph/whodar:{{ .Version }}"
    image_templates:
      - "ghcr.io/dcadolph/whodar:{{ .Version }}-amd64"
      - "ghcr.io/dcadolph/whodar:{{ .Version }}-arm64"
  - name_template: "ghcr.io/dcadolph/whodar:latest"
    image_templates:
      - "ghcr.io/dcadolph/whodar:{{ .Version }}-amd64"
      - "ghcr.io/dcadolph/whodar:{{ .Version }}-arm64"

homebrew_casks:
  - name: whodar
    # The built-in CI token cannot push to the separate homebrew-whodar tap
    # repo, so the cask is generated but not uploaded. To auto-publish it on
    # every release, add a token with write access to the tap and flip this to
    # false.
    skip_upload: "true"
    repository:
      owner: dcadolph
      name: homebrew-whodar
      branch: main
    homepage: "https://github.com/dcadolph/whodar"
    description: "Know who knows. Find who to talk to about X across your work tools."
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/whodar"]
          end

release:
  # The GitHub release and its generated notes are created by
  # `gh release create --generate-notes` before this runs, so keep that release
  # and only attach the build artifacts to it.
  mode: keep-existing
