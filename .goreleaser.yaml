version: 2
project_name: whodar

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: whodar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/dcadolph/whodar/cmd.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: whodar
    repository:
      owner: dcadolph
      name: homebrew-whodar
      branch: main
    homepage: "https://github.com/dcadolph/whodar"
    description: "Know who knows. Find who to talk to about X across your work tools."
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/whodar"]
          end

release:
  draft: false
